<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spanish → English Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-scene">
    <div class="floater" style="--x:5%;--y:10%;--d:0s;--s:3rem">🦙</div>
    <div class="floater" style="--x:85%;--y:15%;--d:-3s;--s:2.6rem">🌵</div>
    <div class="floater" style="--x:15%;--y:75%;--d:-6s;--s:2.4rem">🪇</div>
    <div class="floater" style="--x:90%;--y:70%;--d:-2s;--s:3.2rem">🦙</div>
    <div class="floater" style="--x:50%;--y:5%;--d:-8s;--s:2.2rem">🌶️</div>
    <div class="floater" style="--x:70%;--y:85%;--d:-4s;--s:2rem">🎸</div>
    <div class="floater" style="--x:30%;--y:88%;--d:-10s;--s:2.5rem">🌮</div>
    <div class="floater" style="--x:8%;--y:45%;--d:-5s;--s:2.8rem">🏔️</div>
    <div class="floater" style="--x:92%;--y:42%;--d:-7s;--s:2rem">☀️</div>
    <div class="floater" style="--x:45%;--y:92%;--d:-1s;--s:2.3rem">🦜</div>
    <div class="floater" style="--x:60%;--y:12%;--d:-9s;--s:2rem">🪅</div>
    <div class="floater" style="--x:25%;--y:30%;--d:-11s;--s:2.1rem">🫔</div>
    <div class="floater" style="--x:75%;--y:50%;--d:-6.5s;--s:2.4rem">💃</div>
    <div class="floater" style="--x:40%;--y:60%;--d:-3.5s;--s:2rem">🎺</div>
  </div>

  <main class="card">
    <div class="card-header">
      <span class="logo">🇪🇸</span>
      <h1>Español Quiz</h1>
      <p class="subtitle">Master 1 000 Spanish words</p>
    </div>

    <section id="start">
      <div class="hero-icon">💬</div>
      <p class="intro">Translate <strong>10 random</strong> Spanish words into English.<br>Synonyms &amp; word-forms accepted!</p>
      <button id="startBtn" class="btn-primary btn-glow">▶&ensp;Start Quiz</button>
    </section>

    <section id="game" class="hidden">
      <div class="game-bar">
        <span class="pill" id="progress">1 / 10</span>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <span class="pill accent" id="score">0 ✓</span>
      </div>
      <div class="word-card">
        <small class="label">Translate this word</small>
        <h2 id="spanishWord">palabra</h2>
      </div>
      <div class="input-wrap">
        <input id="answerInput" type="text" placeholder="English…" autocomplete="off" autofocus spellcheck="false" />
        <button id="submitBtn" class="btn-primary">→</button>
      </div>
      <p id="feedback">&nbsp;</p>
    </section>

    <section id="result" class="hidden">
      <div class="grade-circle" id="gradeCircle">0</div>
      <p id="summary" class="summary-text"></p>
      <div id="review"></div>
      <button id="restartBtn" class="btn-primary btn-glow">🔄&ensp;Play Again</button>
    </section>

    <section id="progress-section">
      <div class="section-divider"></div>
      <h2 class="section-title">📊 Progress</h2>
      <div class="stats-row">
        <div class="stat-card"><span id="statGames">0</span><small>Games</small></div>
        <div class="stat-card"><span id="statAvg">0</span><small>Average</small></div>
        <div class="stat-card"><span id="statBest">0</span><small>Best</small></div>
        <div class="stat-card"><span id="statStreak">0</span><small>Streak</small></div>
      </div>
      <canvas id="chart" width="460" height="200"></canvas>
      <p id="noData" class="muted">Play a round to start tracking!</p>
      <button id="clearBtn" class="btn-ghost">Reset Progress</button>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
