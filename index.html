<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spanish → English Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card">
    <div class="card-header">
      <span class="logo">🇪🇸</span>
      <h1>Español Quiz</h1>
      <p class="subtitle">Master 1 000 Spanish words</p>
    </div>

    <section id="start">
      <div class="hero-icon">💬</div>
      <p class="intro">Translate <strong>10 random</strong> Spanish words into English.<br>Now with category mode.</p>
      <div class="category-picker">
        <label for="categorySelect">Choose category</label>
        <select id="categorySelect">
          <option value="all">All words</option>
          <option value="food">Food</option>
          <option value="travel">Travel</option>
          <option value="daily">Day-to-day</option>
        </select>
      </div>
      <button id="startBtn" class="btn-primary btn-glow">▶&ensp;Start Quiz</button>
      <a href="learning-english/" class="btn-ghost" style="display:inline-block;text-decoration:none;margin-top:12px;">🇮🇱 Hebrew → English version</a>
    </section>

    <section id="game" class="hidden">
      <div class="game-bar">
        <span class="pill" id="progress">1 / 10</span>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <span class="pill accent" id="score">0 ✓</span>
      </div>
      <div class="active-category" id="activeCategory">Category: All words</div>
      <div class="word-card">
        <small class="label">Translate this word</small>
        <h2 id="spanishWord">palabra</h2>
      </div>
      <div id="optionsWrap" class="options-wrap">
        <button class="option-btn" data-idx="0"></button>
        <button class="option-btn" data-idx="1"></button>
        <button class="option-btn" data-idx="2"></button>
        <button class="option-btn" data-idx="3"></button>
        <button class="option-btn" data-idx="4"></button>
      </div>
      <p id="feedback">&nbsp;</p>
    </section>

    <section id="result" class="hidden">
      <div class="grade-circle" id="gradeCircle">0</div>
      <p id="summary" class="summary-text"></p>
      <div id="review"></div>
      <button id="restartBtn" class="btn-primary btn-glow">🔄&ensp;Play Again</button>
    </section>

    <section id="progress-section">
      <div class="section-divider"></div>
      <h2 class="section-title">📊 Progress</h2>
      <div class="stats-row">
        <div class="stat-card"><span id="statGames">0</span><small>Games</small></div>
        <div class="stat-card"><span id="statAvg">0</span><small>Average</small></div>
        <div class="stat-card"><span id="statBest">0</span><small>Best</small></div>
        <div class="stat-card"><span id="statStreak">0</span><small>Streak</small></div>
      </div>
      <canvas id="chart" width="460" height="200"></canvas>
      <p id="noData" class="muted">Play a round to start tracking!</p>
      <button id="clearBtn" class="btn-ghost">Reset Progress</button>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
